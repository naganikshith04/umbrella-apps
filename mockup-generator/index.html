<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create professional device mockups online. Upload screenshots, choose device templates, and generate beautiful mockups for free.">
    <meta name="keywords" content="device mockup, screenshot mockup, phone mockup, laptop mockup, mockup generator, design tool">
    <meta property="og:title" content="Device Mockup Generator - Create Professional Mockups">
    <meta property="og:description" content="Upload screenshots and create stunning device mockups with customizable templates and backgrounds.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com">
    <title>Device Mockup Generator - Create Professional Mockups</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9048718254553458" crossorigin="anonymous"></script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Device Mockup Generator",
        "description": "Create professional device mockups with screenshots",
        "applicationCategory": "DesignApplication",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1 class="site-title">📱 Device Mockup Generator</h1>
            <p class="site-subtitle">Create stunning device mockups in seconds</p>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="workspace-layout">
                <aside class="control-panel">
                    <section class="upload-section panel-section">
                        <h2 class="section-title">1. Upload Screenshot</h2>
                        <div class="upload-zone" id="uploadZone">
                            <input type="file" id="screenshotInput" accept="image/*" class="file-input" hidden>
                            <label for="screenshotInput" class="upload-label">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                                </svg>
                                <span class="upload-text">Click or drag image here</span>
                            </label>
                        </div>
                    </section>

                    <section class="device-template-section panel-section">
                        <h2 class="section-title">2. Choose Device</h2>
                        <div class="device-grid">
                            <button class="device-button active" data-device="iphone">
                                <span class="device-icon">📱</span>
                                <span class="device-name">iPhone</span>
                            </button>
                            <button class="device-button" data-device="ipad">
                                <span class="device-icon">💻</span>
                                <span class="device-name">iPad</span>
                            </button>
                            <button class="device-button" data-device="macbook">
                                <span class="device-icon">🖥️</span>
                                <span class="device-name">MacBook</span>
                            </button>
                            <button class="device-button" data-device="android">
                                <span class="device-icon">📲</span>
                                <span class="device-name">Android</span>
                            </button>
                        </div>
                    </section>

                    <section class="position-controls-section panel-section">
                        <h2 class="section-title">3. Adjust Position</h2>
                        <div class="control-group">
                            <label class="control-label">
                                <span>Scale</span>
                                <input type="range" id="scaleSlider" class="slider-control" min="50" max="150" value="100">
                                <span class="control-value" id="scaleValue">100%</span>
                            </label>
                        </div>
                        <div class="control-group">
                            <label class="control-label">
                                <span>Horizontal</span>
                                <input type="range" id="positionX" class="slider-control" min="-100" max="100" value="0">
                                <span class="control-value" id="positionXValue">0</span>
                            </label>
                        </div>
                        <div class="control-group">
                            <label class="control-label">
                                <span>Vertical</span>
                                <input type="range" id="positionY" class="slider-control" min="-100" max="100" value="0">
                                <span class="control-value" id="positionYValue">0</span>
                            </label>
                        </div>
                    </section>

                    <section class="background-section panel-section">
                        <h2 class="section-title">4. Background</h2>
                        <div class="background-options">
                            <button class="bg-button active" data-bg="gradient1" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></button>
                            <button class="bg-button" data-bg="gradient2" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"></button>
                            <button class="bg-button" data-bg="gradient3" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"></button>
                            <button class="bg-button" data-bg="gradient4" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"></button>
                            <button class="bg-button" data-bg="solid" style="background: #ffffff; border: 2px solid #ddd"></button>
                            <input type="color" id="customBg" class="bg-button color-picker" value="#f0f0f0" title="Custom color">
                        </div>
                    </section>

                    <section class="download-section panel-section">
                        <button id="downloadBtn" class="download-button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                            Download Mockup
                        </button>
                    </section>
                </aside>

                <section class="preview-area">
                    <div class="mockup-canvas" id="mockupCanvas">
                        <div class="device-frame" id="deviceFrame">
                            <div class="device-screen">
                                <img id="screenshotPreview" class="screenshot-image" alt="Screenshot preview">
                            </div>
                        </div>
                        <div class="placeholder-message" id="placeholderMsg">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                                <line x1="8" y1="21" x2="16" y2="21"/>
                                <line x1="12" y1="17" x2="12" y2="21"/>
                            </svg>
                            <p>Upload a screenshot to get started</p>
                        </div>
                    </div>
                </section>
            </div>

            <aside class="ad-container">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-9048718254553458"
                     data-ad-slot="1234567890"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </aside>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2024 Device Mockup Generator. Create professional mockups for free.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
